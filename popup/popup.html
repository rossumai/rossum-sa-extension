<?xml version="1.0" encoding="utf-8" ?>
<html lang="en">
  <head>
    <title>Rossum SA Extension - popup</title>
  </head>
  <link href="popup.css" rel="stylesheet" />
  <body>
    <div>
      <button id="masterDataHub">Master Data Hub</button>
    </div>

    <div class="checkboxes">
      <h3>Rossum lens</h3>

      <label>
        <input type="checkbox" id="schemaAnnotationsEnabled" />
        <span>Show Rossum schema IDs</span>
      </label>

      <label>
        <input type="checkbox" id="resourceIdsEnabled" />
        <span>Show resource IDs (queues, annotations)</span>
      </label>

      <label>
        <input type="checkbox" id="expandFormulasEnabled" />
        <span>Expand formula fields automatically</span>
      </label>

      <label>
        <input type="checkbox" id="expandReasoningFieldsEnabled" />
        <span>Expand reasoning fields automatically</span>
      </label>

      <label>
        <input type="checkbox" id="scrollLockEnabled" />
        <span>Prevent sidebar auto-scroll to top</span>
      </label>

      <label>
        <input type="checkbox" id="devFeaturesEnabled" />
        <span>Rossum dev <em>features</em> flag</span>
        <span class="help">(<code>devFeaturesEnabled</code>)</span>
      </label>

      <label>
        <input type="checkbox" id="devDebugEnabled" />
        <span>Rossum dev <em>debug</em> flag</span>
        <span class="help">(<code>devDebugEnabled</code>)</span>
      </label>

      <h3>NetSuite lens</h3>

      <label>
        <input type="checkbox" id="netsuiteFieldNamesEnabled" />
        <span>Show NetSuite field names</span>
      </label>
    </div>

    <div class="info">
      <div>0.17.0</div>
      <div><a href="https://solutionarchitecthandbook.mrtnzlml.com/" target="_blank">The Solution Architect's Handbook</a> 🤓</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
