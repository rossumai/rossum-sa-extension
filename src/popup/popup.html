<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Rossum SA Extension</title>
  <link href="popup.css" rel="stylesheet" />
</head>
<body>
  <div class="accent-bar"></div>

  <header class="header">
    <div class="brand-badge">SA</div>
    <span class="brand-name">Rossum SA</span>
  </header>

  <div id="unsupportedSite" class="unsupported-site hidden">
    <p>Navigate to a supported site to use this extension:</p>
    <div class="supported-sites">
      <span class="supported-site">Rossum</span>
      <span class="supported-site">NetSuite</span>
      <span class="supported-site">Coupa</span>
    </div>
  </div>

  <div id="mainContent">
  <div class="tools-row" data-context="rossum">
    <button id="masterDataHub" class="tool-btn">
      <span>Master Data Hub</span>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
    </button>
  </div>

  <section class="card" data-context="rossum">
    <h3 class="section-title">Rossum</h3>

    <div class="toggle-group">
      <span class="group-label">Overlays</span>

      <label class="toggle">
        <input type="checkbox" id="schemaAnnotationsEnabled" />
        <span class="toggle-track"></span>
        <span class="toggle-label">
          Schema IDs
          <span class="toggle-hint">Overlay schema_id on annotation fields</span>
        </span>
      </label>

      <label class="toggle">
        <input type="checkbox" id="resourceIdsEnabled" />
        <span class="toggle-track"></span>
        <span class="toggle-label">
          Resource IDs
          <span class="toggle-hint">Overlay IDs on queues, hooks, extensions, users</span>
        </span>
      </label>
    </div>

    <div class="toggle-group">
      <span class="group-label">Behavior</span>

      <label class="toggle">
        <input type="checkbox" id="expandFormulasEnabled" />
        <span class="toggle-track"></span>
        <span class="toggle-label">
          Expand formulas
          <span class="toggle-hint">Auto-open formula source code</span>
        </span>
      </label>

      <label class="toggle">
        <input type="checkbox" id="expandReasoningFieldsEnabled" />
        <span class="toggle-track"></span>
        <span class="toggle-label">
          Expand reasoning
          <span class="toggle-hint">Auto-open reasoning field options</span>
        </span>
      </label>

      <label class="toggle">
        <input type="checkbox" id="scrollLockEnabled" />
        <span class="toggle-track"></span>
        <span class="toggle-label">
          Sidebar scroll lock
          <span class="toggle-hint">Keep annotation sidebar scroll position</span>
        </span>
      </label>
    </div>

    <div class="toggle-group">
      <span class="group-label">Developer</span>

      <label class="toggle">
        <input type="checkbox" id="devFeaturesEnabled" />
        <span class="toggle-track"></span>
        <span class="toggle-label">
          Dev features
          <span class="toggle-hint">devFeaturesEnabled</span>
        </span>
      </label>

      <label class="toggle">
        <input type="checkbox" id="devDebugEnabled" />
        <span class="toggle-track"></span>
        <span class="toggle-label">
          Dev debug
          <span class="toggle-hint">devDebugEnabled</span>
        </span>
      </label>
    </div>
  </section>

  <div class="card-row">
    <section class="card" data-context="netsuite">
      <h3 class="section-title">NetSuite</h3>

      <label class="toggle">
        <input type="checkbox" id="netsuiteFieldNamesEnabled" />
        <span class="toggle-track"></span>
        <span class="toggle-label">
          Field names
          <span class="toggle-hint">Show internal IDs on form labels</span>
        </span>
      </label>
    </section>

    <section class="card" data-context="coupa">
      <h3 class="section-title">Coupa <span class="beta-badge">beta</span></h3>

      <label class="toggle">
        <input type="checkbox" id="coupaFieldNamesEnabled" />
        <span class="toggle-track"></span>
        <span class="toggle-label">
          Field names
          <span class="toggle-hint">Show API field names on form labels</span>
        </span>
      </label>
    </section>
  </div>

  <div class="tools-row" data-context="rossum">
    <button id="dataStorage" class="tool-btn">
      <span>Dataset Management</span>
      <span class="beta-badge">beta</span>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
    </button>
  </div>

  </div>

  <footer class="footer">
    <span class="version">0.19.0</span>
    <a href="https://solutionarchitecthandbook.mrtnzlml.com/" target="_blank" class="handbook-link">
      SA Handbook
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
    </a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
